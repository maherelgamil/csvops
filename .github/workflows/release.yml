name: Release

on:
  push:
    tags:
      - 'v*'

# Serialize releases so two tag pushes can't race on the Homebrew tap.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # GoReleaser builds its changelog from git history between tags;
          # a shallow clone truncates it.
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to whatever go.mod requires so CI and release stay in sync.
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # PAT (not the default GITHUB_TOKEN) — required because GoReleaser
          # also pushes the Homebrew formula to maherelgamil/homebrew-tap,
          # which the workflow's default token cannot write to.
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
